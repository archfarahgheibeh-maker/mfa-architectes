function setLang(lang){
const t=translations[lang];

document.querySelectorAll('[data-i18n]').forEach(el=>{
const key=el.getAttribute('data-i18n');
if(t[key]) el.textContent=t[key];
});

const html=document.documentElement;
if(lang==='ar'){html.dir='rtl';html.lang='ar';}
else{html.dir='ltr';html.lang=lang;}

const buttons=document.querySelectorAll('.lang-btn');
buttons.forEach(btn=>{
btn.classList.remove('active');
if(btn.textContent.toLowerCase()===lang){btn.classList.add('active');}
});

localStorage.setItem('mfa_lang',lang);
}

setLang(localStorage.getItem('mfa_lang')||'fr');
