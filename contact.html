<!DOCTYPE html>
<html lang="fr>

<head>
<meta charset="UTF-8">
<title>Contact | MFA Architectes</title>

<style>

body{
font-family:Helvetica, Arial, sans-serif;
margin:0;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.contact-container{
background:white;
padding:40px;
width:420px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
text-align:center;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:5px;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
cursor:pointer;
font-size:14px;
}

.contact-info{
margin-top:25px;
font-size:14px;
line-height:1.6;
}

.social{
margin-top:15px;
}

.social a{
margin-right:10px;
text-decoration:none;
font-weight:bold;
color:black;
}

</style>
</head>

<body>

<div class="contact-container">

<h1>Contact</h1>

<form action="mailto:mfa.architectes@gmail.com" method="post" enctype="text/plain">

<input type="text" placeholder="Nom" required>

<input type="email" placeholder="Email" required>

<textarea rows="5" placeholder="Votre message"></textarea>

<button type="submit">Envoyer</button>

</form>

<div class="contact-info">

<p><b>Email :</b> mfa.architectes@gmail.com</p>

<p><b>Téléphone :</b> 06 76 70 22 86</p>

<div class="social">

<a href="https://www.instagram.com/mfa_studios/" target="_blank">Instagram</a>

<a href="https://www.facebook.com/MFAarch.de?locale=fr_FR" target="_blank">Facebook</a>

<a href="https://www.tiktok.com/@mfa_studios" target="_blank">TikTok</a>

</div>

</div>

</div>

</body>
</html>
