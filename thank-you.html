<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
<meta charset="UTF-8">
<title>Merci | MFA Architectes</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Montserrat',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#fff;
  text-align:center;
  padding:20px;
}

.box{
  max-width:600px;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

p{
  font-size:18px;
  margin-bottom:30px;
}

a{
  display:inline-block;
  padding:12px 25px;
  background:#111;
  color:white;
  text-decoration:none;
  font-weight:600;
}

a:hover{
  background:#FF5722;
}
</style>
</head>

<body>

<div class="box">

<h1 data-i18n="title">Merci !</h1>

<p data-i18n="message">
Votre message a été envoyé avec succès.  
Nous vous contacterons très bientôt.
</p>

<a href="/index.html" data-i18n="back">Retour à l'accueil</a>

</div>

<script>
const translations={
fr:{
title:"Merci !",
message:"Votre message a été envoyé avec succès. Nous vous contacterons très bientôt.",
back:"Retour à l'accueil"
},
en:{
title:"Thank you!",
message:"Your message has been sent successfully. We will contact you very soon.",
back:"Back to home"
},
ar:{
title:"شكراً لك!",
message:"تم إرسال رسالتك بنجاح. سنتواصل معك قريباً.",
back:"العودة للرئيسية"
}
};

function setLang(lang){
const t=translations[lang];

document.querySelectorAll('[data-i18n]').forEach(el=>{
  const key=el.getAttribute('data-i18n');
  if(t[key]) el.textContent=t[key];
});

const html=document.documentElement;
if(lang==='ar'){html.dir='rtl';html.lang='ar';}
else{html.dir='ltr';html.lang=lang;}
}

setLang(localStorage.getItem('mfa_lang')||'fr');
</script>

</body>
</html>
