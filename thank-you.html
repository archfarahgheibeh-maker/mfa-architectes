<!DOCTYPE html>
<html lang="fr" dir="ltr">

<head>
<meta charset="UTF-8">
<title>Merci | MFA Architectes</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Montserrat',sans-serif;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:#fff;
  position:relative;
  overflow:hidden;
}

/* 🔥 WATERMARK LOGO BACKGROUND */
body::before{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80%;
  height:80%;
  background:url('/images/logo.png') no-repeat center;
  background-size:contain;
  opacity:0.06; /* 👈 خففي/زيدي حسب الذوق */
  z-index:0;
}

/* content above watermark */
.box{
  max-width:600px;
  z-index:1;
  position:relative;
}

h1{
  font-size:36px;
  margin-bottom:20px;
}

p{
  font-size:18px;
  margin-bottom:30px;
}

a{
  display:inline-block;
  padding:12px 25px;
  background:#111;
  color:white;
  text-decoration:none;
  font-weight:600;
}

a:hover{
  background:#FF5722;
}

/* 🔥 FOOTER */
footer{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px 15px;
  font-size:14px;
  z-index:2;
}

footer span{
  display:block;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="box">

<h1 data-i18n="title">Merci !</h1>

<p data-i18n="message">
Votre message a été envoyé avec succès.  
Nous vous contacterons très bientôt.
</p>

<a href="/index.html" data-i18n="back">Retour à l'accueil</a>

</div>

<!-- 🔥 FOOTER -->
<footer>
  <span>
    Nous croyons que chaque projet a une âme unique, tout comme chaque client.
  </span>
  <div>#WeBelieve #Architecture #MFAArchitectes</div>
</footer>

<script>
const translations = {
fr:{
title:"Merci !",
message:"Votre message a été envoyé avec succès. Nous vous contacterons très bientôt.",
back:"Retour à l'accueil"
},
en:{
title:"Thank you!",
message:"Your message has been sent successfully. We will contact you very soon.",
back:"Back to home"
},
ar:{
title:"شكراً لك!",
message:"تم إرسال رسالتك بنجاح. سنتواصل معك قريباً.",
back:"العودة للرئيسية"
}
};

function getLang(){
  const params = new URLSearchParams(window.location.search);
  return params.get("lang") || localStorage.getItem("mfa_lang") || "fr";
}

function setLang(lang){
  const t = translations[lang];

  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(t[key]) el.textContent = t[key];
  });

  const html = document.documentElement;
  if(lang === 'ar'){
    html.dir = 'rtl';
    html.lang = 'ar';
  } else {
    html.dir = 'ltr';
    html.lang = lang;
  }
}

const lang = getLang();
setLang(lang);
localStorage.setItem("mfa_lang", lang);
</script>

</body>
</html>
